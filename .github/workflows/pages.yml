name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt
          cache: gradle

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Install pandoc
        run: sudo apt-get install -y --no-install-recommends pandoc

      - name: Convert Markdown to HTML
        run: |
          mkdir -p _site
          pandoc README.md \
            --standalone \
            --metadata title="RotatingSecrets" \
            --lua-filter .github/pandoc/mermaid.lua \
            --include-after-body .github/pandoc/mermaid-init.html \
            --output _site/index.html

      - name: Copy Javadoc
        run: |
          mkdir -p _site/javadoc
          cp -r build/docs/javadoc/. _site/javadoc/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
