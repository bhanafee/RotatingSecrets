name: Deploy Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt
          cache: gradle

      - name: Run tests and generate reports
        run: ./gradlew test jacocoTestReport javadoc

      - name: Install pandoc
        run: sudo apt-get install -y --no-install-recommends pandoc

      - name: Convert Markdown to HTML
        run: |
          mkdir -p _site
          cp .github/pandoc/theme.css _site/
          cp .github/pandoc/skylighting-paper-theme.css _site/
          pandoc README.md \
            --template .github/pandoc/template.html5 \
            --metadata title="RotatingSecrets" \
            --lua-filter .github/pandoc/mermaid.lua \
            --include-after-body .github/pandoc/mermaid-init.html \
            --css theme.css \
            --css skylighting-paper-theme.css \
            --output _site/index.html
          pandoc CODE_OF_CONDUCT.md \
            --template .github/pandoc/template.html5 \
            --metadata title="Code of Conduct" \
            --css theme.css \
            --css skylighting-paper-theme.css \
            --output _site/CODE_OF_CONDUCT.html
          pandoc CLAUDE.md \
            --template .github/pandoc/template.html5 \
            --metadata title="Claude Code Guidance" \
            --css theme.css \
            --css skylighting-paper-theme.css \
            --output _site/CLAUDE.html

      - name: Copy Javadoc
        run: |
          mkdir -p _site/javadoc/rotating-secrets _site/javadoc/demo
          cp -r rotating-secrets/build/docs/javadoc/. _site/javadoc/rotating-secrets/
          cp -r demo/build/docs/javadoc/. _site/javadoc/demo/
          cp LICENSE _site/

      - name: Copy test results
        run: |
          mkdir -p _site/tests/rotating-secrets _site/tests/demo
          cp -r rotating-secrets/build/reports/tests/test/. _site/tests/rotating-secrets/
          cp -r demo/build/reports/tests/test/. _site/tests/demo/

      - name: Copy coverage report
        run: |
          mkdir -p _site/coverage/rotating-secrets _site/coverage/demo
          cp -r rotating-secrets/build/reports/jacoco/test/html/. _site/coverage/rotating-secrets/
          cp -r demo/build/reports/jacoco/test/html/. _site/coverage/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
